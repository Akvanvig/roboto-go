apiVersion: v1
kind: ConfigMap
metadata:
  name: roboto-cm
data:
  roboto-config.yaml: |-
    discord:
      token: {{ .Values.roboto.discord.token | quote}}
    lavalink:
      nodes:
        - name: {{ include "roboto-go.name" . }}-lavalink
          address: {{ printf "%s-lavalink:%v" (include "roboto-go.name" . ) (int $.Values.lavalink.service.port) }}
          password: {{ include "roboto-go.lavalinkPassword" . }}
        # {{- range $i, $e := until ( int .Values.roboto.lavalink.replicas ) }}
        # - name: {{ printf "%s-lavalink-%v" ( include "roboto-go.name" $ ) $i }}
        #   address: {{ printf "%s-lavalink-%v:%v" ( include "roboto-go.name" $ ) $i (int $.Values.lavalink.service.port) }}
        #   password: {{ include "roboto-go.lavalinkPassword" . }}
        # {{- end }}
    ollama:
    {{- with .Values.ollama }}
      server: {{ .server | quote }}
      chatPath: {{ .chatPath | quote }}
      generatePath: {{ .generatePath | quote }}
      {{- with .defaultPrompt }}
      defaultPrompt:
        name: {{ .name | quote }}
        model: {{ .model | quote }}
        systemPrompt: |- {{ .systemPrompt | nindent 10 }}
      {{- end }}
      {{- with .serverPrompts }}
      serverPrompts:
        {{- range $k, $v := . }}
        {{ $k }}: {{ with $v }}
          name: {{ .name | default "" | quote }}
          exclusive: {{ .exclusive | default false }}
          model: {{ .model | default "" | quote }}
          systemPrompt: |- {{ .systemPrompt | nindent 12 }}
        {{- end }}
        {{- end }}
      {{- end }}
      {{- with .channelPrompts }}
      channelPrompts:
        {{- range $k, $v := . }}
        {{ $k }}: {{ with $v }}
          name: {{ .name | default "" | quote }}
          exclusive: {{ .exclusive | default false }}
          model: {{ .model | default "" | quote }}
          systemPrompt: |- {{ .systemPrompt | nindent 12 }}
        {{- end }}
        {{- end }}
      {{- end }}
    {{- end }}
